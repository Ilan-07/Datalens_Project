name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools mypy pytest
        pip-sync requirements.txt
        
    - name: Ensure Lockfile matches requirements.in
      run: |
        pip-compile requirements.in -o requirements_check.txt
        diff requirements.txt requirements_check.txt || (echo "Lockfile is out of date! Run pip-compile locally." && exit 1)
        
    - name: Type Checking with MyPy
      run: |
        mypy app/
        
    - name: Test with pytest
      run: pytest
